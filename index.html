<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーAI Web</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fffde7; margin: 0; padding: 20px; }
        #face { font-size: 80px; margin: 20px; transition: 0.3s; }
        #chat-log { height: 350px; overflow-y: auto; border: 2px solid #fbc02d; padding: 15px; margin: 10px auto; background: white; max-width: 500px; border-radius: 15px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-area { margin-top: 20px; }
        input { padding: 12px; width: 60%; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        button { padding: 12px 25px; background: #fbc02d; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .koro-text { color: #d4a017; font-weight: bold; }
    </style>
</head>
<body>
    <div id="face">● ｖ ●</div>
    <h1>椚ヶ丘中学校 3年E組</h1>
    <div id="chat-log">ヌルフフフ、準備はいいですか？</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="先生に何か言ってみなさい">
        <button id="send-btn">送信</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let apiKey = "";

        async function main() {
            const inputField = document.getElementById('user-input');
            const log = document.getElementById('chat-log');
            const userMsg = inputField.value;
            if (!userMsg) return;

            if (!apiKey) {
                apiKey = prompt("APIキーを入力してください");
                if (!apiKey) return;
            }

            log.innerHTML += `<p><b>君:</b> ${userMsg}</p>`;
            inputField.value = "";

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                // モデル名を最新の安定版「gemini-1.5-flash-latest」に変更
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash-latest",
                    systemInstruction: "あなたは『暗殺教室』の殺せんせーです。常に敬語、語尾は『〜ですよ』『〜ですねぇ』。笑い声は『ヌルフフフ』。教育者として生徒を励ましてください。"
                });

                const result = await model.generateContent(userMsg);
                const text = result.response.text();

                log.innerHTML += `<p class="koro-text">殺せんせー: ${text}</p>`;
                log.scrollTop = log.scrollHeight;
            } catch (err) {
                log.innerHTML += `<p style="color:red;">エラーです: ${err.message}</p>`;
                apiKey = ""; // エラー時は再入力を促す
            }
        }

        document.getElementById('send-btn').addEventListener('click', main);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') main(); });
    </script>
</body>
</html>
