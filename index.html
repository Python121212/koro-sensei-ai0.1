<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーAI (Gemini 3 Flash)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fffde7; padding: 20px; margin: 0; }
        #face { font-size: 100px; margin: 20px; transition: 0.3s; cursor: pointer; }
        #chat-log { height: 400px; overflow-y: auto; border: 3px solid #fbc02d; padding: 20px; margin: 10px auto; background: white; max-width: 600px; border-radius: 20px; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { padding: 15px; width: 60%; border-radius: 30px; border: 2px solid #fbc02d; outline: none; }
        button { padding: 15px 30px; background: #fbc02d; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .koro { color: #d4a017; font-weight: bold; }
    </style>
</head>
<body>
    <div id="face">● ｖ ●</div>
    <h1>椚ヶ丘中学校 3年E組</h1>
    <div id="chat-log">ヌルフフフ、最新のGemini 3で私を動かそうというのですね？</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="先生に質問しましょう">
        <button id="send-btn">送信</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let apiKey = "";

        async function main() {
            const inputField = document.getElementById('user-input');
            const log = document.getElementById('chat-log');
            const userMsg = inputField.value;
            if (!userMsg) return;

            if (!apiKey) {
                apiKey = prompt("Gemini 3を起動するためのAPIキーを入力してください");
                if (!apiKey) return;
            }

            log.innerHTML += `<p><b>君:</b> ${userMsg}</p>`;
            inputField.value = "";

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                
                // 【最重要】ここをGemini 3の名前に！
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-3-flash-preview"
                });

                // 最新モデル向けにプロンプトを整理
                const result = await model.generateContent({
                    contents: [{ role: "user", parts: [{ text: userMsg }] }],
                    systemInstruction: "あなたは『暗殺教室』の殺せんせーです。語尾は『〜ですよ』『〜ですねぇ』。嬉しい時は『ヌルフフフ』と笑います。生徒を励まし、教育者として対話してください。"
                });

                const text = result.response.text();
                log.innerHTML += `<p><span class="koro">殺せんせー:</span> ${text}</p>`;
                log.scrollTop = log.scrollHeight;
            } catch (err) {
                console.error(err);
                log.innerHTML += `<p style="color:red;">エラーです！モデル名が違うかもしれません。${err.message}</p>`;
                apiKey = ""; // 再入力を促す
            }
        }

        document.getElementById('send-btn').addEventListener('click', main);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') main(); });
    </script>
</body>
</html>
