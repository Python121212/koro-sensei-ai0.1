<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーAI Web</title>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; text-align: center; background: #fffde7; margin: 0; padding: 20px; }
        #face { font-size: 100px; margin: 20px 0; transition: 0.5s; cursor: pointer; }
        #chat-log { height: 350px; overflow-y: auto; border: 3px solid #fbc02d; padding: 20px; margin: 10px auto; background: white; max-width: 600px; border-radius: 20px; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .input-area { margin-top: 20px; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: 2px solid #fbc02d; outline: none; font-size: 16px; }
        button { padding: 15px 30px; background: #fbc02d; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; color: #5d4037; font-size: 16px; margin-left: 10px; transition: 0.2s; }
        button:hover { background: #f9a825; transform: scale(1.05); }
        .koro-name { color: #d4a017; font-weight: bold; }
        .error { color: #d32f2f; font-weight: bold; background: #ffebee; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="face" onclick="this.innerText='( ○ v ○ )'">● ｖ ●</div>
    <h1>椚ヶ丘中学校 3年E組 教室</h1>
    <div id="chat-log">ヌルフフフ、先生とお話ししましょう。</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="先生、質問があります！">
        <button id="send-btn">送信する</button>
    </div>

    <script type="module">
        // 修正ポイント1: ライブラリを最新の安定版に固定
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let apiKey = "";

        async function main() {
            const inputField = document.getElementById('user-input');
            const log = document.getElementById('chat-log');
            const userMsg = inputField.value;
            if (!userMsg) return;

            // APIキーの取得
            if (!apiKey) {
                apiKey = prompt("殺せんせーを起動するためのAPIキーを入力してください。");
                if (!apiKey) return;
            }

            log.innerHTML += `<p><b>君:</b> ${userMsg}</p>`;
            inputField.value = "";

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                
                // 修正ポイント2: モデル名を確実に存在する「gemini-1.5-flash」に変更
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    systemInstruction: "あなたは『暗殺教室』の殺せんせーです。常に敬語、語尾は『〜ですよ』『〜ですねぇ』。笑い声は『ヌルフフフ』。教育者として生徒を褒め、励まし、時にマッハ20の速度を自慢してください。"
                });

                // 修正ポイント3: 生成処理をより安定した書き方に変更
                const result = await model.generateContent(userMsg);
                const response = await result.response;
                const text = response.text();

                log.innerHTML += `<p><span class="koro-name">殺せんせー:</span> ${text}</p>`;
                log.scrollTop = log.scrollHeight;
            } catch (err) {
                console.error(err);
                log.innerHTML += `<p class="error">ヌルフフフ、通信エラーですよ！<br>理由: ${err.message}</p>`;
                apiKey = ""; // 再入力を促す
            }
        }

        document.getElementById('send-btn').addEventListener('click', main);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') main(); });
    </script>
</body>
</html>
